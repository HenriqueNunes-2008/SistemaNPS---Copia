<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha de Acesso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0f87e9;
            --bg-end: #202677;
            --card-bg: linear-gradient(135deg, #7c90c2, #2c53d4);
            --text-dark: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --accent: #3c6cf5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Montserrat", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(90deg, var(--bg-start), var(--bg-end));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 140px 16px 32px;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: #ffffff;
            z-index: 40;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-radius: 0 0 50px 50px;
        }

        .logo-fixed {
            position: absolute;
            top: 50%;
            left: 1%;
            transform: translateY(-50%);
            height: 255%;
            pointer-events: none;
        }

        .logo-link {
            position: absolute;
            top: 50%;
            left: calc(1% + 85px);
            transform: translateY(-50%);
            width: 190px;
            height: 50px;
            z-index: 45;
            display: block;
        }

        .external-info {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            line-height: 1.6;
            z-index: 10;
        }

        .external-info .address {
            font-size: 14px;
        }

        .external-info .contact {
            font-size: 14px;
            opacity: 0.9;
        }

        .card {
            width: min(450px, 96vw);
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
            overflow: hidden;
            padding: 48px 44px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            text-align: center;
            line-height: 1.3;
        }

        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input {
            height: 44px;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.75);
            background: transparent;
            padding: 0 6px;
            font-size: 14px;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input:focus {
            border-color: #ffffff;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .submit-btn {
            height: 46px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #1f4bbd, #7c42e5);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            background: linear-gradient(90deg, #1a3f9f, #6735c7);
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error {
            color: #ffd0d0;
            font-size: 13px;
            font-weight: 600;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            body { padding-top: 118px; }
            .topbar {
                height: 106px;
                display: flex;
                justify-content: center;
                align-items: center;
                border-radius: 0 0 28px 28px;
            }
            .logo-fixed {
                position: static;
                transform: none;
                height: 72px;
            }
            .logo-link {
                left: 50%;
                transform: translate(-50%, -50%);
                width: 200px;
            }
            .card { padding: 36px 28px; margin: 20px; }
            .external-info { margin-top: 20px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <img src="/static/LogoFlexcolor2.png" class="logo-fixed" alt="Logo">
        <a href="/" class="logo-link"></a>
    </div>

    <div class="external-info">
        <div class="address">
            R. José Antônio Valadares, 285 – Vila Liviero<br>
            São Paulo – SP. CEP: 04185-020
        </div>
        <div class="contact">
            comercial@soukure.com.br | (11) 2372-7444
        </div>
    </div>

    <div class="card">
        <h1 class="title">Digite a senha de acesso para preencher o termo</h1>
        {% if erro %}
            <div class="error">{{ erro }}</div>
        {% endif %}
        <form method="post" action="/admin-password">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" placeholder="Digite seu e-mail" required autofocus>
            </div>
            <div class="input-group">
                <label for="password">Senha de acesso</label>
                <input id="password" name="password" type="password" placeholder="Digite a senha" required>
            </div>
            <button class="submit-btn" type="submit">ACESSAR</button>
        </form>
    </div>
</body>
</html>
