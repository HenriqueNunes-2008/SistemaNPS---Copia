<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema NPS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .nav-pills .nav-link { color: #6c757d; }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
        .logo { display: block; margin: 0 auto 1.5rem; max-height: 50px; }
    </style>
</head>
<body>

<div class="auth-card">
    <img src="/static/LogoFlexcolor.png" alt="Logo" class="logo">
    
    <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button">Login</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button">Cadastrar</button>
        </li>
    </ul>

    <!-- Mensagens de Alerta -->
    {% if erro %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ erro }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}

    {% if msg %}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}

    <div class="tab-content">
        <!-- Formulário de Login -->
        <div class="tab-pane fade show active" id="pills-login">
            <form action="/admin-password" method="post">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" required placeholder="seu@email.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" required placeholder="******">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Entrar no Painel</button>
            </form>
        </div>

        <!-- Formulário de Cadastro -->
        <div class="tab-pane fade" id="pills-register">
            <form action="/registrar" method="post">
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" required placeholder="João Silva">
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" required placeholder="seu@email.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Crie uma Senha</label>
                    <input type="password" name="password" class="form-control" required placeholder="Mínimo 6 caracteres">
                </div>
                <div class="alert alert-info py-2 small">
                    Seu cadastro passará por aprovação administrativa.
                </div>
                <button type="submit" class="btn btn-outline-primary w-100 py-2">Solicitar Acesso</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Mantém a aba de registro ativa se houver erro vindo do registro
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('msg') || urlParams.get('erro') === 'E-mail já cadastrado.') {
            // Opcional: focar na aba de registro se necessário
        }
    }
</script>
</body>
</html>
